<!DOCTYPE html>
<html>
  <head>
    <title>Add/Remove</title>
  </head>
<body>
  <input type="button" value="Add element" onclick="add()">
  <input type="button" value="Remove element" onclick="remove()">





  <script>
    var a=document.createElement("h1");

    function add(){
      a.innerHTML="JavaScript"
      document.body.appendChild(a);

    }

    function remove(){
      a.remove();
    }


  </script>

</body>
</html>
