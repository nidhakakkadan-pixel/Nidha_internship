<!DOCTYPE html>
<html>
<head>
    <title>Learn JS</title>
</head>
<body>

<script>
    function odd_even(){
        var a = prompt("Enter a number:");

        a = Number(a);

        if(a % 2 == 0){
            document.write("The number is even");
        } else {
            document.write("The number is odd");
        }
    }

    odd_even();
</script>

</body>
