<!DOCTYPE html>
<html>
<body>

<h3>Dynamic List</h3>

<input type="text" id="item">
<button onclick="addItem()">Add</button>

<ul id="list"></ul>

<script>
function addItem() {
  let input = document.getElementById("item");
  let li = document.createElement("li");

  li.innerText = input.value;

  document.getElementById("list").appendChild(li);

  input.value = "";
}
</script>

</body>
</html>
