<!DOCTYPE html>
<html>
<head>
<title>Flexbox</title>

<style>
body {
    background-color: goldenrod;
}
.row_container {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    height: 300px;
    background: greenyellow;
    border: 2px solid black;
}

.box {
    width: 150;
    height: 100;
    background: violet;
    text-align: center;
    line-height: 100px;
    font-size: 25px;
    border: 1px solid black;
}

.column_container {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    height: 500px;
    margin-top: 20px;
    background: darkslategray;
    border: 2px solid black;
}


</style>

</head>
<body>

<h2> ROW - left to right</h2>

<div class="row_container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>
<br>
<h2>COLUMN-top to bottum</h2>

<div class="column_container">
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
</div>

</body>
</html>
