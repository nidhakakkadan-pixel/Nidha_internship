<!DOCTYPE html>
<html>
<head>
<title>Position</title>

<style>

.navbar {
    position: fixed;
    top: 0px;
    width: 100%;
    background: lightblue;
    color: darkblue;
    padding: 15px;
    text-align: center;
    font-size: 1cm;
            
}

h2 {
    margin-top: 80px;
    padding: 20px;
    font-style: italic;
    font-size: 30px;
    color: darkcyan;
    border-bottom: solid black 1px;
}

h3 {
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    font-size: 0.8cm;
    color: purple;
}

.card {
    position: relative; /* important */
    width: 300px;
    border: 2px solid black;
    padding: 10px;
    margin: auto;
}

h4 {
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    font-size: 0.5cm;
    color: purple;
}
        
img {
    width: 200px;
}

.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: lightskyblue;
    color: darkblue;
    padding: 5px 10px;
}

h5 {
    position: static;
    background: lightblue;
    color: purple;
    padding: 10px;
    width: 150px;
    font-size: 0.5cm;
        }
</style>
</head>

<body>

<div class="navbar"><b>MOBILEPHONE (fixed)</b></div>
<h2>Mobile Phones</h2>
<div class="card">
    <span class="badge">Buy now (absolute)</span>
        <img src="https://media.tatacroma.com/Croma%20Assets/Communication/Mobiles/Images/312579_0_elav0i.png?updatedAt=1752306017365">
        <h3>Vivo Y29 5G</h3>
        <h4>Budget friendly mobile phone.<br>(relative)</h4>
</div>
<h5>Discount upto 65% (static)</h5>
           
</body>
</html>
